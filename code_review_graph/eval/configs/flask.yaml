name: flask
url: https://github.com/pallets/flask
commit: HEAD
language: python
size_category: small

test_commits:
  - sha: HEAD~1
    description: "Recent change 1"
    changed_files: 2
  - sha: HEAD~2
    description: "Recent change 2"
    changed_files: 4

entry_points:
  - "src/flask/app.py::Flask.wsgi_app"
  - "src/flask/blueprints.py::Blueprint.register"

search_queries:
  - query: "request context"
    expected: "src/flask/ctx.py::RequestContext"
  - query: "URL routing"
    expected: "src/flask/app.py::Flask.add_url_rule"
