    description: "Recent change 1"
    changed_files: 3
  - sha: HEAD~2
    description: "Recent change 2"
    changed_files: 5

entry_points:
  - "fastapi/applications.py::FastAPI"
  - "fastapi/routing.py::APIRouter.add_api_route"

search_queries:
